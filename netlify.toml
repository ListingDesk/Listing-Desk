[build]
  command = "vite build"
  publish = "dist/client"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

# Identity-based role protection for admin routes
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin/login"
  to = "/admin/login"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/login"
  status = 302
